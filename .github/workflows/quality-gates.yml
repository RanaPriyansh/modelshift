name: FORGE quality gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: forge-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      OPENAI_API_KEY: ""
      FORGE_CLOUD_ACCOUNTS_ENABLED: "false"
      OPENAI_INTERPRETATION_ENABLED: "false"
      OPENAI_FORGE_PLANNER_ENABLED: "false"
      FORGE_BROWSER_ARTIFACT_ID: forge-playwright-failure-${{ github.run_id }}
    steps:
      - name: Check out immutable source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 11.9.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit and contract tests
        run: pnpm test
      - name: Offline evaluation gate
        run: pnpm eval
      - name: Capture immutable build identity
        run: |
          printf 'FORGE_BUILD_TIME=%s\n' "$(date -u -d "$(git show -s --format=%cI "$GITHUB_SHA")" +%Y-%m-%dT%H:%M:%S.000Z)" >> "$GITHUB_ENV"
          printf 'FORGE_LOCKFILE_DIGEST=%s\n' "$(shasum -a 256 pnpm-lock.yaml | cut -d' ' -f1)" >> "$GITHUB_ENV"
          printf 'FORGE_CONTENT_MANIFEST_DIGEST=%s\n' "$(shasum -a 256 scripts/ops/content-package-manifest.json | cut -d' ' -f1)" >> "$GITHUB_ENV"
          printf 'FORGE_EVALUATOR_BASELINE_DIGEST=%s\n' "$(shasum -a 256 scripts/ops/evaluation-baseline.json | cut -d' ' -f1)" >> "$GITHUB_ENV"
          printf 'FORGE_DATABASE_MIGRATION_IDENTITY=not_configured\n' >> "$GITHUB_ENV"
      - name: Build production artifact
        env:
          FORGE_RELEASE_SHA: ${{ github.sha }}
        run: pnpm build
      - name: Install Chromium test runtime
        run: pnpm exec playwright install --with-deps chromium
      - name: Browser release contract
        id: browser
        continue-on-error: true
        run: pnpm exec tsx scripts/ops/run-production-browser-verification.ts --expected-sha "$GITHUB_SHA"
      - name: Write sanitized evaluation report
        id: evaluation_report
        if: always()
        continue-on-error: true
        run: pnpm exec tsx scripts/ops/evaluation-report.ts --git-sha "$GITHUB_SHA" --output-dir test-results/release-ops
      - name: Verify local production artifact
        id: local_verify
        if: always()
        continue-on-error: true
        run: pnpm exec tsx scripts/ops/run-local-production-verification.ts --expected-sha "$GITHUB_SHA" --output-dir test-results/release-ops
      - name: Write bounded Playwright failure manifest
        if: always()
        continue-on-error: true
        run: pnpm exec tsx scripts/ops/playwright-artifact-manifest.ts --root test-results --output test-results/release-ops/playwright-artifact-manifest.json --stage-dir test-results/release-ops/playwright-failure-artifacts --tested-sha "$GITHUB_SHA" --artifact-id "$FORGE_BROWSER_ARTIFACT_ID"
      - name: Upload sanitized operations reports
        if: always() && hashFiles('test-results/release-ops/*') != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: forge-release-reports-${{ github.run_id }}
          path: test-results/release-ops/
          if-no-files-found: error
          retention-days: 14
      - name: Upload bounded Playwright failure evidence
        if: always() && steps.browser.outcome == 'failure' && hashFiles('test-results/release-ops/playwright-artifact-manifest.json') != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: forge-playwright-failure-${{ github.run_id }}
          path: |
            test-results/release-ops/playwright-failure-artifacts/
            test-results/release-ops/playwright-artifact-manifest.json
          if-no-files-found: warn
          retention-days: 14
      - name: Enforce release gate outcomes
        if: always()
        run: |
          test "${{ steps.browser.outcome }}" = success
          test "${{ steps.evaluation_report.outcome }}" = success
          test "${{ steps.local_verify.outcome }}" = success
