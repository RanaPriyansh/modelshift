name: FORGE deployment verification (read-only)

on:
  workflow_dispatch:
    inputs:
      target_origin:
        description: HTTPS origin to inspect; no deployment or alias mutation is performed
        required: true
        type: string
      allowed_host:
        description: Exact host allowlist entry for target_origin
        required: true
        type: string
      expected_sha:
        description: Full 40-character Git SHA expected at the inspected origin
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-read-only:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      OPENAI_API_KEY: ""
      FORGE_CLOUD_ACCOUNTS_ENABLED: "false"
      FORGE_LESSON_STUDIO_OPENAI_ENABLED: "false"
      TARGET_ORIGIN: ${{ inputs.target_origin }}
      ALLOWED_HOST: ${{ inputs.allowed_host }}
      EXPECTED_RELEASE_SHA: ${{ inputs.expected_sha }}
    steps:
      - name: Check out verifier source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 11.9.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Install locked verifier dependencies
        run: pnpm install --frozen-lockfile
      - name: Run bounded same-origin GET verifier
        run: pnpm exec tsx scripts/ops/deployment-verifier.ts --base-url "$TARGET_ORIGIN" --allowed-host "$ALLOWED_HOST" --expected-sha "$EXPECTED_RELEASE_SHA" --output-dir test-results/release-ops
      - name: Upload sanitized verification report
        if: always() && hashFiles('test-results/release-ops/*') != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: forge-deployment-verification-${{ github.run_id }}
          path: test-results/release-ops/
          if-no-files-found: error
          retention-days: 14
