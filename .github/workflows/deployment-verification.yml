name: FORGE deployment verification (read-only)

on:
  workflow_dispatch:
    inputs:
      target_id:
        description: Checked-in deployment target ID; the caller cannot provide an origin or host
        required: true
        type: choice
        options:
          - forge_learning_os_project
      expected_sha:
        description: Full 40-character Git SHA expected at the inspected origin
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-read-only:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      OPENAI_API_KEY: ""
      FORGE_CLOUD_ACCOUNTS_ENABLED: "false"
      OPENAI_INTERPRETATION_ENABLED: "false"
      OPENAI_FORGE_PLANNER_ENABLED: "false"
      TARGET_ID: ${{ inputs.target_id }}
      EXPECTED_RELEASE_SHA: ${{ inputs.expected_sha }}
    steps:
      - name: Check out verifier source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 11.9.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Capture immutable verifier dependency identity before install
        run: node scripts/operations/immutable-lockfile.mjs capture --source-ref "$GITHUB_SHA" --github-env "$GITHUB_ENV"
      - name: Install locked verifier dependencies
        run: pnpm install --frozen-lockfile
      - name: Reject post-install verifier lockfile mutation
        run: node scripts/operations/immutable-lockfile.mjs verify --expected-digest "$FORGE_LOCKFILE_DIGEST"
      - name: Compute checked-in release metadata
        run: |
          printf 'FORGE_CONTENT_MANIFEST_DIGEST=%s\n' "$(shasum -a 256 scripts/ops/content-package-manifest.json | cut -d' ' -f1)" >> "$GITHUB_ENV"
          printf 'FORGE_EVALUATOR_BASELINE_DIGEST=%s\n' "$(shasum -a 256 scripts/ops/evaluation-baseline.json | cut -d' ' -f1)" >> "$GITHUB_ENV"
      - name: Run bounded same-origin GET verifier
        run: >-
          pnpm exec tsx scripts/ops/deployment-verifier.ts
          --target-id "$TARGET_ID"
          --expected-sha "$EXPECTED_RELEASE_SHA"
          --expected-lockfile-digest "$FORGE_LOCKFILE_DIGEST"
          --expected-content-manifest-digest "$FORGE_CONTENT_MANIFEST_DIGEST"
          --expected-evaluator-baseline-digest "$FORGE_EVALUATOR_BASELINE_DIGEST"
          --expected-database-migration-identity not_configured
          --output-dir test-results/release-ops
      - name: Upload sanitized verification report
        if: always() && hashFiles('test-results/release-ops/*') != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: forge-deployment-verification-${{ github.run_id }}
          path: test-results/release-ops/
          if-no-files-found: error
          retention-days: 14
